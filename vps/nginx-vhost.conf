# HTTP – přesměrování na HTTPS
server {
    listen 80;
    server_name ucto.katerinamlcakova.cz;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name ucto.katerinamlcakova.cz;

    ssl_certificate     /etc/letsencrypt/live/ucto.katerinamlcakova.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ucto.katerinamlcakova.cz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend – statické soubory sestavené Vitem
    root /opt/vytezovani-faktur/frontend/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Backend health
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
